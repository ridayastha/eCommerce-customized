<style>
    /* Image Container Box Layout */
    .img-wrap {
        display: block;
        height: 240px; /* Dictates universal height safety boundaries across all grid layouts */
        overflow: hidden;
        position: relative;
        background-color: #f8f9fa;
    }

    /* Reset and Modern Image Alignment */
    .img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transition: transform 0.5s ease;
    }

    /* Premium Micro-Interaction Zoom Hover Effect */
    .card-product-grid:hover .img-wrap img {
        transform: scale(1.08);
    }
    
    /* Smooth card layout borders */
    .card-product-grid {
        border: 1px solid #e9ecef !important;
        border-radius: 8px !important;
        overflow: hidden;
        width: 100%;
    }
</style>

<div class="card card-product-grid shadow-none h-100">
    <a href="{{ product.get_url }}" class="img-wrap">
        <img src="{{ product.images.url }}" alt="{{ product.product_name }}">
    </a>

    <div class="info-wrap p-3 d-flex flex-column justify-content-between flex-grow-1">
        <div>
            <a href="{{ product.get_url }}" class="title text-center d-block text-dark text-decoration-none mb-1" style="font-size: 0.95rem; line-height: 1.4;">
                {{ product.product_name }}
            </a>

            <div class="price text-center mb-2">
                <span class="text-dark"><strong>$ {{ product.price }}</strong></span>
            </div>

            <div class="mb-3 text-center text-warning" style="font-size: 0.85rem;">
                <span>
                    <i class="fa fa-star{% if product.averageReview < 0.5 %}-o{% elif product.averageReview >= 0.5 and product.averageReview < 1 %}-half-o {% endif %}" aria-hidden="true"></i>
                    <i class="fa fa-star{% if product.averageReview < 1.5 %}-o{% elif product.averageReview >= 1.5 and product.averageReview < 2 %}-half-o {% endif %}" aria-hidden="true"></i>
                    <i class="fa fa-star{% if product.averageReview < 2.5 %}-o{% elif product.averageReview >= 2.5 and product.averageReview < 3 %}-half-o {% endif %}" aria-hidden="true"></i>
                    <i class="fa fa-star{% if product.averageReview < 3.5 %}-o{% elif product.averageReview >= 3.5 and product.averageReview < 4 %}-half-o {% endif %}" aria-hidden="true"></i>
                    <i class="fa fa-star{% if product.averageReview < 4.5 %}-o{% elif product.averageReview >= 4.5 and product.averageReview < 5 %}-half-o {% endif %}" aria-hidden="true"></i>
                </span>
            </div>
        </div>

        <div class="mt-auto">
            {% if product.stock <= 0 %}
                <button class="btn btn-sm btn-danger w-100 py-2 font-weight-bold" style="border-radius: 6px;" disabled>
                    <i class="fa fa-times-circle mr-1"></i> Out of Stock
                </button>
            {% else %}
                <a href="{{ product.get_url }}" class="btn btn-sm btn-outline-dark w-100 py-2 font-weight-bold" style="border-radius: 6px;">
                    <i class="fa fa-shopping-cart mr-1"></i> Add to Cart
                </a>
            {% endif %}
        </div>
    </div>
</div>
